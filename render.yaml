databases:
  - name: vms-postgres
    databaseName: sabbathtarian_db
    ipAllowList: []

services:
  - type: web
    name: vms-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vms-postgres
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FRONTEND_URL
        value: "https://vms-frontend.onrender.com"

  - type: web
    name: vms-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://vms-backend.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
